# MaxIOFS Docker Compose Configuration
# Version: 1.1.0
#
# Usage:
#   docker compose up                       # Basic: MaxIOFS only
#   docker compose --profile monitoring up  # With Prometheus + Grafana
#
# Quick commands:
#   make docker-build       # Build image
#   make docker-up          # Start basic
#   make docker-monitoring  # Start with monitoring
#   make docker-down        # Stop all
#   make docker-logs        # View logs

services:
  # =============================================================================
  # MaxIOFS Main Service
  # =============================================================================
  maxiofs:
    image: maxiofs/maxiofs:latest
    # To build locally from source instead of pulling from DockerHub, comment the
    # line above and uncomment the block below:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     VERSION: ${VERSION:-1.1.0}
    #     COMMIT: ${GIT_COMMIT:-dev}
    #     BUILD_DATE: ${BUILD_DATE}
    container_name: maxiofs
    restart: unless-stopped

    ports:
      - "8080:8080"  # S3 API
      - "8081:8081"  # Web Console

    volumes:
      # Data directory: buckets, objects, metadata, and config.yaml all live here.
      # Using a bind mount means config.yaml appears directly on your host at
      # ./maxiofs-data/config.yaml — edit it and restart to apply changes.
      # All settings (encryption, SMTP, public URLs, TLS, etc.) live in that file.
      - ./maxiofs-data:/data
      #
      # Prefer Docker-managed storage? Replace the line above with:
      # - maxiofs-data:/data
      # Then access config.yaml via: docker run --rm -it -v maxiofs-data:/data alpine vi /data/config.yaml

    environment:
      # Data directory — must match the volume mount above
      MAXIOFS_DATA_DIR: "/data"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

    networks:
      - maxiofs-network

    labels:
      - "com.maxiofs.version=1.1.0"
      - "com.maxiofs.description=S3-compatible object storage server"

  # =============================================================================
  # Prometheus - Metrics Collection (monitoring profile)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: maxiofs-prometheus
    restart: unless-stopped
    profiles:
      - monitoring

    ports:
      - "9091:9090"

    volumes:
      - prometheus-data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

    networks:
      - maxiofs-network

    depends_on:
      maxiofs:
        condition: service_healthy

    labels:
      - "com.maxiofs.component=monitoring"

  # =============================================================================
  # Grafana - Visualization Dashboards (monitoring profile)
  # =============================================================================
  grafana:
    image: grafana/grafana:11.5.0
    container_name: maxiofs-grafana
    restart: unless-stopped
    profiles:
      - monitoring

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

    environment:
      # Security
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

      # Server
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

      # Anonymous access (disable for production)
      GF_AUTH_ANONYMOUS_ENABLED: "false"

      # Dashboards
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/maxiofs.json"

    networks:
      - maxiofs-network

    depends_on:
      - prometheus

    labels:
      - "com.maxiofs.component=monitoring"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus-data:
    driver: local
    labels:
      - "com.maxiofs.component=monitoring"

  grafana-data:
    driver: local
    labels:
      - "com.maxiofs.component=monitoring"

# =============================================================================
# Networks
# =============================================================================
networks:
  maxiofs-network:
    driver: bridge
    labels:
      - "com.maxiofs.network=main"
